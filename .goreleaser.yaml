version: 2

project_name: palimpsest

before:
  hooks:
    - go mod download

builds:
  - main: ./cmd/palimpsest
    binary: palimpsest
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE

homebrew_casks:
  - repository:
      owner: bvdwalt
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/bvdwalt/palimpsest"
    description: "Self-hosted markdown wiki for homelab notes"
    license: "MIT"

# Docker — remove this section if not publishing a Docker image
dockers_v2:
  - id: dockerhub
    images:
      - "{{ .Env.DOCKERHUB_USERNAME }}/palimpsest"
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile.goreleaser
    platforms:
      - linux/amd64
      - linux/arm64

  - id: ghcr
    images:
      - "ghcr.io/bvdwalt/palimpsest"
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile.goreleaser
    platforms:
      - linux/amd64
      - linux/arm64

checksum:
  name_template: checksums.txt

release:
  github:
    owner: bvdwalt
    name: palimpsest

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
