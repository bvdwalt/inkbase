name: Version Preview

on:
  pull_request:
    branches: ["main"]

permissions:
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install svu
        run: go install github.com/caarlos0/svu/v3@latest

      - name: Compute version preview
        id: version
        run: |
          CURRENT=$(svu current)
          NEXT=$(svu next)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Post version preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const current = '${{ steps.version.outputs.current }}';
            const next = '${{ steps.version.outputs.next }}';
            const bump = current === next ? 'no bump' : `${current} → **${next}**`;
            const body = `### Version preview\n\nMerging this PR will produce: ${bump}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('### Version preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
