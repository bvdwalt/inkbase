name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Node
        if: hashFiles('web/package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        if: hashFiles('web/package.json') != ''
        run: cd web && npm install && npm run build

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Format
        run: just fmt

      - name: Test
        run: just test
